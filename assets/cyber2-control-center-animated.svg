<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-label="Animated cyber2 control center simulation">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020810"/>
      <stop offset="100%" stop-color="#071223"/>
    </linearGradient>
    <linearGradient id="cyanLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f3ff"/>
      <stop offset="100%" stop-color="#00ffc8"/>
    </linearGradient>
    <linearGradient id="panelFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#061829" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#0a1d31" stop-opacity="0.92"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.8" result="blurred"/>
      <feMerge>
        <feMergeNode in="blurred"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#123149" stroke-width="1" opacity="0.55"/>
    </pattern>
  </defs>

  <rect width="1200" height="620" fill="url(#bg2)"/>
  <rect width="1200" height="620" fill="url(#grid2)" opacity="0.55">
    <animateTransform attributeName="transform" type="translate" values="0 0;0 40;0 0" dur="14s" repeatCount="indefinite"/>
  </rect>

  <rect x="24" y="20" width="1152" height="66" rx="10" fill="#07192a" stroke="#00f3ff" stroke-opacity="0.35"/>
  <text x="42" y="50" fill="#00f3ff" font-family="monospace" font-size="24" font-weight="700" filter="url(#softGlow)">
    CYBER SECURITY CONTROL CENTER (SAFE MODE)
  </text>
  <text x="42" y="72" fill="#9ad5df" font-family="monospace" font-size="12">
    Visual simulation only | No hacking | No real credentials | No network attacks
  </text>
  <rect x="24" y="94" width="1152" height="2" fill="url(#cyanLine)" opacity="0.95"/>

  <rect x="30" y="110" width="560" height="218" rx="9" fill="url(#panelFill)" stroke="#00f3ff" stroke-opacity="0.42"/>
  <text x="48" y="138" fill="#00f3ff" font-family="monospace" font-size="16">Threat Feed</text>
  <text x="48" y="164" fill="#cdf9ff" font-family="monospace" font-size="12">[sim] Initializing cyber2 dashboard...</text>
  <text x="48" y="186" fill="#9fd3de" font-family="monospace" font-size="12">[sim] Parsing training signals and logs...</text>
  <text x="48" y="208" fill="#9fd3de" font-family="monospace" font-size="12">[sim] Building anomaly timeline...</text>
  <text x="48" y="230" fill="#9fd3de" font-family="monospace" font-size="12">[sim] Rendering secure operations board...</text>
  <rect x="48" y="252" width="522" height="8" rx="4" fill="#102739"/>
  <rect x="48" y="252" width="120" height="8" rx="4" fill="url(#cyanLine)">
    <animate attributeName="width" values="80;430;210;500;120" dur="6.2s" repeatCount="indefinite"/>
  </rect>
  <text x="48" y="286" fill="#b8e8ee" font-family="monospace" font-size="12">Status: synchronized with cyber2 visual theme</text>

  <rect x="610" y="110" width="560" height="218" rx="9" fill="url(#panelFill)" stroke="#00ffc8" stroke-opacity="0.42"/>
  <text x="628" y="138" fill="#00ffc8" font-family="monospace" font-size="16">Ops Metrics</text>
  <text x="628" y="164" fill="#d9fff2" font-family="monospace" font-size="12">Integrity Monitor</text>
  <rect x="628" y="174" width="520" height="7" rx="3.5" fill="#102739"/>
  <rect x="628" y="174" width="420" height="7" rx="3.5" fill="#00ffc8">
    <animate attributeName="width" values="320;500;410;460;420" dur="5.4s" repeatCount="indefinite"/>
  </rect>
  <text x="628" y="202" fill="#d9fff2" font-family="monospace" font-size="12">Signal Stability</text>
  <rect x="628" y="212" width="520" height="7" rx="3.5" fill="#102739"/>
  <rect x="628" y="212" width="360" height="7" rx="3.5" fill="#00f3ff">
    <animate attributeName="width" values="240;390;470;300;360" dur="4.8s" repeatCount="indefinite"/>
  </rect>
  <text x="628" y="240" fill="#d9fff2" font-family="monospace" font-size="12">Learning Throughput</text>
  <rect x="628" y="250" width="520" height="7" rx="3.5" fill="#102739"/>
  <rect x="628" y="250" width="300" height="7" rx="3.5" fill="#00ffc8">
    <animate attributeName="width" values="180;350;420;280;300" dur="6.8s" repeatCount="indefinite"/>
  </rect>
  <text x="628" y="286" fill="#9fd3de" font-family="monospace" font-size="12">Matrix stream active (safe visual output)</text>

  <rect x="30" y="346" width="1140" height="238" rx="9" fill="url(#panelFill)" stroke="#00f3ff" stroke-opacity="0.42"/>
  <text x="48" y="374" fill="#00f3ff" font-family="monospace" font-size="16">Mission Timeline</text>
  <text x="48" y="402" fill="#e0fbff" font-family="monospace" font-size="13">[x] OverTheWire Natas - level 8</text>
  <text x="48" y="426" fill="#e0fbff" font-family="monospace" font-size="13">[x] OverTheWire Leviathan - level 3</text>
  <text x="48" y="450" fill="#e0fbff" font-family="monospace" font-size="13">[~] Nmap basic host/service discovery</text>
  <text x="48" y="474" fill="#e0fbff" font-family="monospace" font-size="13">[~] Linux command-line hardening practice</text>
  <text x="48" y="498" fill="#98cad6" font-family="monospace" font-size="12">Goal: keep learning consistently and improve fundamentals.</text>

  <rect x="48" y="528" width="1104" height="14" rx="7" fill="#102739" stroke="#00f3ff" stroke-opacity="0.35"/>
  <rect x="50" y="530" width="300" height="10" rx="5" fill="url(#cyanLine)">
    <animate attributeName="width" values="320;780;540;860;620;300" dur="7.6s" repeatCount="indefinite"/>
  </rect>
  <text x="764" y="539" fill="#c9f4ff" font-family="monospace" font-size="12">Cyber2 Progress (README-safe animation)</text>

  <rect x="0" y="-12" width="1200" height="14" fill="url(#cyanLine)" opacity="0.45">
    <animate attributeName="y" values="-12;620;-12" dur="4.4s" repeatCount="indefinite"/>
  </rect>
</svg>
