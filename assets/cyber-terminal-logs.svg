<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-label="SERVER_LOGS // COMMAND_INTERFACE">
  <defs>
    <linearGradient id="bgTerm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020814"/>
      <stop offset="100%" stop-color="#05142a"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8dff5e"/>
      <stop offset="50%" stop-color="#ffbd2e"/>
      <stop offset="100%" stop-color="#ff5f56"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="560" fill="url(#bgTerm)"/>

  <rect x="0" y="0" width="1200" height="410" rx="8" fill="#000" stroke="#15253a"/>
  <rect x="0" y="0" width="1200" height="42" fill="#0f0f0f"/>

  <circle cx="24" cy="21" r="8" fill="#ff5f56"/>
  <circle cx="48" cy="21" r="8" fill="#ffbd2e"/>
  <circle cx="72" cy="21" r="8" fill="#27c93f"/>

  <g font-family="monospace" font-size="32">
    <text x="20" y="86" fill="#78b6ff">[22:11:40]</text>
    <text x="200" y="86" fill="#0092ff">&gt; Port 80: OPEN. Port 443: OPEN. Port 22: FILTERED.</text>

    <text x="20" y="130" fill="#78b6ff">[22:11:43]</text>
    <text x="200" y="130" fill="#ff5f56">&gt; ALERT: Unauthorized access attempt detected on IP 192.168.1.45</text>

    <text x="20" y="174" fill="#78b6ff">[22:11:46]</text>
    <text x="200" y="174" fill="#0092ff">&gt; Deploying counter-measures. Isolating subnet.</text>

    <text x="20" y="218" fill="#78b6ff">[22:11:48]</text>
    <text x="200" y="218" fill="#00ff88">&gt; Threat neutralized. IP blacklisted.</text>

    <text x="20" y="262" fill="#78b6ff">[22:11:52]</text>
    <text x="200" y="262" fill="#0092ff">&gt; Awaiting further instructions...</text>

    <text x="20" y="306" fill="#78b6ff">[22:11:55]</text>
    <text x="200" y="306" fill="#0092ff">&gt; Establishing secure connection...</text>

    <text x="20" y="350" fill="#78b6ff">[22:11:58]</text>
    <text x="200" y="350" fill="#0092ff">&gt; Handshake protocol initiated. Key exchange successful.</text>

    <text x="20" y="394" fill="#78b6ff">[22:12:00]</text>
    <text x="200" y="394" fill="#00ff88">&gt; Uplink established. Latency: 12ms.</text>
  </g>

  <text x="10" y="470" fill="#d8e4f0" font-family="monospace" font-size="30">DEFCON LEVEL</text>
  <text x="1032" y="470" fill="#ffcc3a" font-family="monospace" font-size="30">ELEVATED</text>

  <rect x="0" y="490" width="1200" height="9" rx="4.5" fill="#0f1926" stroke="#27384c"/>
  <rect x="0" y="490" width="310" height="9" rx="4.5" fill="url(#barGrad)">
    <animate attributeName="width" values="260;340;300;320;310" dur="6.2s" repeatCount="indefinite"/>
  </rect>
