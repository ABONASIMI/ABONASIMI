<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="Animated global node topology">
  <defs>
    <linearGradient id="nodeBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020812"/>
      <stop offset="100%" stop-color="#041022"/>
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#50f6ff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#50f6ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="scanBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00cfff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00f3ff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#00cfff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="420" fill="url(#nodeBg)"/>
  <rect x="4" y="4" width="1192" height="412" rx="6" fill="none" stroke="#00cfff" stroke-opacity="0.55"/>

  <rect x="18" y="20" width="250" height="4" rx="2" fill="#0d2d3e"/>
  <rect x="18" y="20" width="120" height="4" rx="2" fill="url(#scanBar)">
    <animate attributeName="x" values="18;980;18" dur="3.4s" repeatCount="indefinite"/>
    <animate attributeName="width" values="90;220;110" dur="2.8s" repeatCount="indefinite"/>
  </rect>

  <g opacity="0.28" fill="#26e8ff">
    <circle cx="90" cy="28" r="2"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.6s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="30" r="2"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.1s" repeatCount="indefinite"/></circle>
    <circle cx="210" cy="27" r="2"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.9s" repeatCount="indefinite"/></circle>
  </g>

  <g>
    <g>
      <g stroke="#44e9ff" stroke-width="1.6" opacity="0.48" fill="none">
        <polyline points="44,132 130,176 88,228 28,210 44,132"/>
      </g>
      <g fill="#38f0ff">
        <circle cx="44" cy="132" r="4.4"/>
        <circle cx="130" cy="176" r="4.4"/>
        <circle cx="88" cy="228" r="4.4"/>
        <circle cx="28" cy="210" r="4.4"/>
      </g>
      <animateTransform attributeName="transform" type="translate" values="0 0;6 -4;0 0" dur="7s" repeatCount="indefinite"/>
    </g>

    <g>
      <g stroke="#44e9ff" stroke-width="1.6" opacity="0.48" fill="none">
        <polyline points="218,138 300,124 342,190 274,242 218,138"/>
      </g>
      <g fill="#38f0ff">
        <circle cx="218" cy="138" r="4.4"/>
        <circle cx="300" cy="124" r="4.4"/>
        <circle cx="342" cy="190" r="4.4"/>
        <circle cx="274" cy="242" r="4.4"/>
      </g>
      <animateTransform attributeName="transform" type="translate" values="0 0;-5 5;0 0" dur="6.4s" repeatCount="indefinite"/>
    </g>

    <g>
      <g stroke="#44e9ff" stroke-width="1.6" opacity="0.48" fill="none">
        <polyline points="428,118 502,168 474,246 404,206 428,118"/>
      </g>
      <g fill="#38f0ff">
        <circle cx="428" cy="118" r="4.4"/>
        <circle cx="502" cy="168" r="4.4"/>
        <circle cx="474" cy="246" r="4.4"/>
        <circle cx="404" cy="206" r="4.4"/>
      </g>
      <animateTransform attributeName="transform" type="translate" values="0 0;4 6;0 0" dur="7.6s" repeatCount="indefinite"/>
    </g>

    <g>
      <g stroke="#44e9ff" stroke-width="1.6" opacity="0.48" fill="none">
        <polyline points="860,124 938,118 1012,132 1026,202 956,226 904,146 860,124"/>
      </g>
      <g fill="#38f0ff">
        <circle cx="860" cy="124" r="4.4"/>
        <circle cx="938" cy="118" r="4.4"/>
        <circle cx="1012" cy="132" r="4.4"/>
        <circle cx="1026" cy="202" r="4.4"/>
        <circle cx="956" cy="226" r="4.4"/>
        <circle cx="904" cy="146" r="4.4"/>
      </g>
      <animateTransform attributeName="transform" type="translate" values="0 0;-6 4;0 0" dur="6.8s" repeatCount="indefinite"/>
    </g>

    <g>
      <g stroke="#44e9ff" stroke-width="1.6" opacity="0.48" fill="none">
        <polyline points="808,300 904,322 998,308 1060,246 1002,218 960,304 1060,246"/>
      </g>
      <g fill="#38f0ff">
        <circle cx="808" cy="300" r="4.4"/>
        <circle cx="904" cy="322" r="4.4"/>
        <circle cx="998" cy="308" r="4.4"/>
        <circle cx="1060" cy="246" r="4.4"/>
        <circle cx="1002" cy="218" r="4.4"/>
        <circle cx="960" cy="304" r="4.4"/>
      </g>
      <animateTransform attributeName="transform" type="translate" values="0 0;5 -4;0 0" dur="7.2s" repeatCount="indefinite"/>
    </g>

    <g>
      <g stroke="#44e9ff" stroke-width="1.6" opacity="0.48" fill="none">
        <polyline points="542,254 602,218 654,206 622,252 562,304 542,254"/>
      </g>
      <g fill="#38f0ff">
        <circle cx="542" cy="254" r="4.4"/>
        <circle cx="602" cy="218" r="4.4"/>
        <circle cx="654" cy="206" r="4.4"/>
        <circle cx="622" cy="252" r="4.4"/>
        <circle cx="562" cy="304" r="4.4"/>
      </g>
      <animateTransform attributeName="transform" type="translate" values="0 0;-4 -5;0 0" dur="6.6s" repeatCount="indefinite"/>
    </g>
  </g>

  <path id="routeA" d="M44 132 L130 176 L88 228 L28 210 L44 132" fill="none" stroke="none"/>
  <path id="routeB" d="M428 118 L502 168 L474 246 L404 206 L428 118" fill="none" stroke="none"/>
  <path id="routeC" d="M860 124 L938 118 L1012 132 L1026 202 L956 226 L904 146 Z" fill="none" stroke="none"/>

  <circle r="3.2" fill="#9afcff">
    <animateMotion dur="4s" repeatCount="indefinite" rotate="auto">
      <mpath href="#routeA"/>
    </animateMotion>
  </circle>
  <circle r="3.2" fill="#9afcff">
    <animateMotion dur="4.8s" repeatCount="indefinite" rotate="auto">
      <mpath href="#routeB"/>
    </animateMotion>
  </circle>
  <circle r="3.2" fill="#9afcff">
    <animateMotion dur="5.2s" repeatCount="indefinite" rotate="auto">
      <mpath href="#routeC"/>
    </animateMotion>
  </circle>

  <circle cx="300" cy="124" r="18" fill="url(#nodeGlow)">
    <animate attributeName="r" values="10;24;10" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="956" cy="226" r="18" fill="url(#nodeGlow)">
    <animate attributeName="r" values="9;22;9" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="602" cy="218" r="18" fill="url(#nodeGlow)">
    <animate attributeName="r" values="9;20;9" dur="2.1s" repeatCount="indefinite"/>
  </circle>

  <circle cx="600" cy="210" r="14" fill="none" stroke="#00f3ff" stroke-opacity="0.4" stroke-width="1.4">
    <animate attributeName="r" values="14;190" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.45;0" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <rect x="16" y="404" width="1168" height="2" fill="url(#scanBar)" opacity="0.75">
    <animate attributeName="y" values="52;404;52" dur="3.9s" repeatCount="indefinite"/>
  </rect>
</svg>
