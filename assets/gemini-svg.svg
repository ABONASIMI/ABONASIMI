<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%" style="background-color: #050505; font-family: monospace;">
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#0f2b10" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <line x1="0" y1="0" x2="800" y2="0" stroke="#00ff00" stroke-width="2" opacity="0.3">
    <animate attributeName="y1" values="0;400;0" dur="5s" repeatCount="indefinite" />
    <animate attributeName="y2" values="0;400;0" dur="5s" repeatCount="indefinite" />
  </line>

  <g filter="url(#glow)">
    <path d="M 150 250 L 350 150 L 550 200 L 650 100 L 350 150" fill="none" stroke="#00cc00" stroke-width="1.5" stroke-dasharray="5 5">
      <animate attributeName="stroke-dashoffset" values="20;0" dur="1s" repeatCount="indefinite" />
    </path>
    <path d="M 350 150 L 400 300 L 550 200" fill="none" stroke="#00ff00" stroke-width="1" opacity="0.5" />

    <circle cx="150" cy="250" r="5" fill="#00ff00">
      <animate attributeName="r" values="4;7;4" dur="1.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="350" cy="150" r="7" fill="#00ff00">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" />
    </circle>
    <circle cx="550" cy="200" r="5" fill="#00ff00" />
    <circle cx="650" cy="100" r="4" fill="#ff0000">
      <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite" />
    </circle>
    <circle cx="400" cy="300" r="5" fill="#00ff00" />
  </g>

  <text x="20" y="30" fill="#00ff00" font-size="14">
    > INITIATING_SECURE_PROTOCOL...
    <animate attributeName="opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite" />
  </text>
  <text x="20" y="55" fill="#00cc00" font-size="14">> UPLINK_ESTABLISHED</text>
  <text x="20" y="80" fill="#00cc00" font-size="14">> BYPASSING_FIREWALL: [████████░░] 80%</text>
  <text x="20" y="105" fill="#ff0000" font-size="14">
    > TARGET_LOCKED: 192.168.4.15
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
  </text>

  <text x="630" y="85" fill="#ff0000" font-size="12">BREACH DETECTED</text>
  <text x="360" y="140" fill="#00ff00" font-size="12">NODE_ALPHA</text>
</svg>
