<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-label="Radar node animation">
  <defs>
    <linearGradient id="radarBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020913"/>
      <stop offset="100%" stop-color="#041022"/>
    </linearGradient>
    <linearGradient id="scanLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00c6ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00f3ff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#00c6ff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="sweepGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f3ff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#00f3ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="560" fill="url(#radarBg)"/>
  <rect x="8" y="8" width="1184" height="544" rx="8" fill="none" stroke="#00c6ff" stroke-opacity="0.35"/>

  <rect x="44" y="72" width="1112" height="2" fill="#1a3a58"/>

  <g stroke="#0f4c6b" stroke-width="2" opacity="0.55">
    <line x1="70" y1="110" x2="180" y2="150"/>
    <line x1="180" y1="150" x2="150" y2="215"/>
    <line x1="150" y1="215" x2="44" y2="180"/>

    <line x1="220" y1="90" x2="330" y2="130"/>
    <line x1="330" y1="130" x2="360" y2="62"/>
    <line x1="360" y1="62" x2="470" y2="80"/>
    <line x1="470" y1="80" x2="450" y2="150"/>
    <line x1="450" y1="150" x2="360" y2="170"/>

    <line x1="820" y1="70" x2="920" y2="55"/>
    <line x1="920" y1="55" x2="1020" y2="95"/>
    <line x1="1020" y1="95" x2="990" y2="170"/>
    <line x1="990" y1="170" x2="920" y2="190"/>
    <line x1="920" y1="190" x2="870" y2="130"/>

    <line x1="130" y1="420" x2="200" y2="385"/>
    <line x1="200" y1="385" x2="260" y2="455"/>

    <line x1="540" y1="430" x2="590" y2="495"/>
    <line x1="790" y1="455" x2="870" y2="465"/>
    <line x1="870" y1="465" x2="950" y2="420"/>
    <line x1="950" y1="420" x2="990" y2="430"/>
  </g>

  <g fill="#00dfff" opacity="0.9">
    <circle cx="70" cy="110" r="4"/>
    <circle cx="180" cy="150" r="4"/>
    <circle cx="150" cy="215" r="4"/>
    <circle cx="44" cy="180" r="4"/>
    <circle cx="220" cy="90" r="4"/>
    <circle cx="330" cy="130" r="4"/>
    <circle cx="360" cy="62" r="4"/>
    <circle cx="470" cy="80" r="4"/>
    <circle cx="450" cy="150" r="4"/>
    <circle cx="360" cy="170" r="4"/>
    <circle cx="820" cy="70" r="4"/>
    <circle cx="920" cy="55" r="4"/>
    <circle cx="1020" cy="95" r="4"/>
    <circle cx="990" cy="170" r="4"/>
    <circle cx="920" cy="190" r="4"/>
    <circle cx="870" cy="130" r="4"/>
    <circle cx="130" cy="420" r="4"/>
    <circle cx="200" cy="385" r="4"/>
    <circle cx="260" cy="455" r="4"/>
    <circle cx="540" cy="430" r="4"/>
    <circle cx="590" cy="495" r="4"/>
    <circle cx="790" cy="455" r="4"/>
    <circle cx="870" cy="465" r="4"/>
    <circle cx="950" cy="420" r="4"/>
    <circle cx="990" cy="430" r="4"/>
    <animate attributeName="opacity" values="0.55;1;0.55" dur="2.4s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(600 300)">
    <circle r="170" fill="none" stroke="#00d5e8" stroke-width="3"/>
    <circle r="130" fill="none" stroke="#006f95" stroke-width="1.5"/>
    <circle r="95" fill="none" stroke="#006f95" stroke-width="1.5"/>
    <circle r="62" fill="none" stroke="#006f95" stroke-width="1.5"/>
    <circle r="38" fill="none" stroke="#006f95" stroke-width="1.5"/>

    <g>
      <path d="M 0 0 L 55 -75 A 95 95 0 0 1 116 -16 Z" fill="url(#sweepGlow)" opacity="0.82"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
    </g>

    <circle cx="0" cy="0" r="3" fill="#00f3ff"/>
    <circle cx="8" cy="-92" r="3.2" fill="#00f3ff"/>
    <circle cx="-38" cy="44" r="3.2" fill="#00f3ff"/>
    <circle cx="45" cy="95" r="5" fill="#ff6161">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <rect x="44" y="538" width="1112" height="1.5" fill="url(#scanLine)" opacity="0.6">
    <animate attributeName="y" values="88;538;88" dur="3.8s" repeatCount="indefinite"/>
  </rect>
</svg>
